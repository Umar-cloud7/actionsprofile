name: Build WF
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Maven Build
        run: mvn install
      - name: Upload Build Artifacts (WAR)
        uses: actions/upload-artifact@v4
        with:
          name: vprofile-app
          path: target/*.war
      - name: Notify if Build Fails
        if: failure()
        run: echo "Build failed! Please check the logs."


  Testing: 
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Code checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Test on main branch
        if: github.ref == 'refs/heads/main'
        run: mvn test

      - name: checkstyle test
        if: github.ref == 'refs/heads/main'
        run: mvn checkstyle:checkstyle
      
      - name: Run Test on main branch
        if: github.ref != 'refs/heads/main'
        run: echo 'Skipping unit tests and code analysis for non-main branches'